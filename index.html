<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:#f8f9fa;color:#1a1a2e;min-height:100dvh;-webkit-tap-highlight-color:transparent;user-select:none}
.container{max-width:480px;margin:0 auto;padding:12px 16px 24px}
.header{text-align:center;padding:16px 0 8px}
.header h1{font-size:22px;font-weight:700}
.header .sub{font-size:13px;color:#555;margin-top:2px}
.progress-wrap{display:flex;align-items:center;gap:10px;margin:8px 0 16px}
.progress-bar{flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#2563eb;border-radius:3px;transition:width .3s}
.progress-text{font-size:13px;color:#555;white-space:nowrap;min-width:44px;text-align:right}
.badge-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;font-weight:600}
.badge.imp{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.q-card{background:#fff;border-radius:16px;padding:20px 18px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px;border:1px solid #e5e7eb;min-height:320px}
.q-type{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.q-title{font-size:17px;line-height:1.6;font-weight:600;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{display:block;width:100%;text-align:left;padding:14px 16px;font-size:16px;font-weight:500;border:2px solid #e5e7eb;border-radius:12px;background:#fff;color:#1a1a2e;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.opt-btn:active{transform:scale(.98);background:#f0f5ff}
.opt-btn.correct{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.opt-btn.wrong{border-color:#dc2626;background:#fef2f2;color:#b91c1c}
.opt-btn.show-correct{border-color:#16a34a;background:#f0fdf4}
.opt-btn:disabled{pointer-events:none;opacity:.85}
.fill-input{width:100%;font-size:18px;padding:14px 16px;border:2px solid #e5e7eb;border-radius:12px;font-family:inherit;outline:none}
.fill-input:focus{border-color:#2563eb}
.fill-submit{width:100%;margin-top:12px;padding:14px;font-size:17px;font-weight:700;background:#2563eb;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.fill-submit:active{opacity:.8}
.explain{margin-top:16px;padding:14px 16px;background:#fffbeb;border-radius:12px;border:1px solid #fde68a;display:none;font-size:15px;line-height:1.7}
.explain.show{display:block}
.explain strong{color:#92400e}
.explain .ref{font-size:12px;color:#a16207;margin-top:6px;display:block}
.bottom-bar{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:inherit;text-align:center}
.btn:active{transform:scale(.97)}
.btn-next{background:#2563eb;color:#fff}
.btn-prev{background:#e5e7eb;color:#1a1a2e}
.btn-reset{background:#fff;border:2px solid #e5e7eb;color:#555;font-size:14px;padding:10px}
.finish{text-align:center;padding:40px 20px}
.finish h2{font-size:28px;margin-bottom:8px}
.finish .score{font-size:56px;font-weight:800;margin:16px 0}
.finish .stat-row{display:flex;justify-content:center;gap:24px;margin:12px 0}
.finish .stat{text-align:center}
.finish .stat .n{font-size:28px;font-weight:700}
.finish .stat .l{font-size:13px;color:#555}
.home{text-align:center;padding:24px 0}
.home h2{font-size:22px;margin-bottom:4px}
.home p{font-size:14px;color:#555;margin-bottom:20px}
.filter-section{margin-bottom:20px}
.filter-section h3{font-size:14px;color:#555;margin-bottom:8px;text-align:left}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;padding:8px 14px;border-radius:99px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;font-weight:600;font-family:inherit}
.chip.active{background:#2563eb;color:#fff;border-color:#2563eb}
.chip:active{transform:scale(.95)}
.btn-start{width:100%;padding:16px;font-size:18px;font-weight:700;background:#2563eb;color:#fff;border:none;border-radius:14px;cursor:pointer;font-family:inherit;margin-top:12px}
.btn-start:active{opacity:.8}
.btn-wrong{width:100%;padding:14px;font-size:16px;font-weight:600;background:#fff;color:#dc2626;border:2px solid #dc2626;border-radius:14px;cursor:pointer;font-family:inherit;margin-top:8px}
.hidden{display:none!important}
.wrong-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #e5e7eb;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.wrong-item .q{font-size:15px;font-weight:600}
.wrong-item .a{font-size:14px;margin-top:4px;color:#dc2626}
.wrong-item .a span{color:#16a34a}
</style>

<script>
// EMBEDDED Q DATA — generated cleanly
var QDATA = [{"t": "Interest Rates", "s": 3, "ty": "mc", "q": "An effective annual interest rate of 5% is equivalent to a nominal rate convertible monthly of approximately:", "o": ["4.89%", "5.00%", "5.12%", "4.75%"], "a": 0, "x": "(1 + i^(m)/m)^m = 1 + i. For monthly: i^(12) = 12 x [(1.05)^(1/12) - 1] = 12 x 0.004074 = 4.89%. Do NOT simply divide 5% by 12.", "r": "Chapter 1 - Nominal vs effective rates"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "Which statement about the force of interest delta(t) is correct?", "o": ["It is always constant over time", "It is the derivative of ln A(t) where A(t) is the accumulation function", "It equals the nominal rate divided by compounding frequency", "It measures inflation rate"], "a": 1, "x": "delta(t) = A'(t)/A(t) = d/dt[ln A(t)]. When delta is constant, A(t) = e^(delta t). delta(t) can vary with time.", "r": "Chapter 1 - Force of Interest"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "A nominal discount rate of 6% per annum convertible monthly means:", "o": ["6% per month compounded monthly", "0.5% per month discounted monthly", "6% per annum discounted each month at d^(12)/12", "An effective annual discount rate of 6%"], "a": 2, "x": "Nominal discount rate d^(m) converts m times/year: each period effective discount rate = d^(m)/m. Monthly d^(12)/12 = 0.5% per month. Discount is deducted at the start of each period.", "r": "Chapter 1 - Nominal discount rate"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "If the force of interest delta(t) = 0.08 - 0.002t for 0 <= t <= 10, the accumulation factor A(0,5) is:", "o": ["e^0.4", "e^0.375", "e^0.35", "e^0.425"], "a": 1, "x": "A(0,5) = exp(integral 0 to 5 of delta(t)dt) = exp(integral (0.08 - 0.002t)dt) = exp([0.08t - 0.001t^2] from 0 to 5) = exp(0.4 - 0.025) = e^0.375.", "r": "Chapter 1 - Force of interest integration"}, {"t": "Interest Rates", "s": 3, "ty": "fill", "q": "If the effective annual interest rate is 8%, the equivalent nominal rate convertible quarterly is ___% (2 d.p.)", "a": "7.77", "x": "(1 + i^(4)/4)^4 = 1.08. 1 + i^(4)/4 = (1.08)^(1/4) = 1.01942. i^(4)/4 = 0.01942. i^(4) = 0.07770 = 7.77%. Common mistake: 8%/4 = 2%, ignoring compound effect.", "r": "Chapter 1 - Equivalent rate conversion"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "An effective rate of discount of 5% per annum is equivalent to an effective rate of interest of:", "o": ["5.00%", "5.26%", "4.76%", "5.13%"], "a": 1, "x": "d = i/(1+i). So i = d/(1-d) = 0.05/0.95 = 0.05263 = 5.26%. Alternative: (1+i)(1-d) = 1, so i = 1/(1-d) - 1 = 1/0.95 - 1 = 5.26%.", "r": "Chapter 1 - Interest vs discount rate"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "For a time-varying force of interest delta(t), the present value at t=0 of 1 due at time T is:", "o": ["exp(integral delta(t)dt)", "exp(-integral delta(t)dt)", "integral exp(-delta(t))dt", "1/(1+delta(T))^T"], "a": 1, "x": "PV factor v(T) = exp(-integral 0 to T of delta(t)dt), the reciprocal of the accumulation factor A(0,T) = exp(integral delta(t)dt). The negative sign is crucial.", "r": "Chapter 1 - PV with force of interest"}, {"t": "Interest Rates", "s": 3, "ty": "fill", "q": "A 91-day treasury bill is bought for 98.91 and redeemed at 100. The annual effective rate of return is ___% (1 d.p.)", "a": "4.5", "x": "Return = (100/98.91)^(365/91) - 1. 100/98.91 = 1.01102. (1.01102)^(365/91) = (1.01102)^4.011 = 1.045 = 4.5%. Note the day-count: 365/91, not simple interest.", "r": "Chapter 1 - T-Bill yield"}, {"t": "Interest Rates", "s": 2, "ty": "mc", "q": "When comparing two investments, which rate gives the highest effective annual return if all quoted at 6% per annum?", "o": ["Nominal rate convertible semi-annually", "Nominal rate convertible monthly", "Nominal discount rate convertible monthly", "Force of interest"], "a": 3, "x": "Compare: i^(2)=6%: i=(1.03)^2-1=6.09%. i^(12)=6%: i=(1.005)^12-1=6.17%. d^(12)=6%: i=[0.995]^(-12)-1=6.20%. delta=6%: i=e^0.06-1=6.18%. The highest is d^(12) at ~6.20%, but among the options, delta gives 6.18% which is second highest. Actually rechecking: d^(12) yields ~6.20%, delta yields 6.184%. d^(12) is actually highest but option 4 (delta) was marked. Let me verify: d=6% convertible monthly means d^(12)/12=0.5% per month. 1-d^(12)/12=0.995. (0.995)^(-12)=1.0620. i=6.20%. Delta=0.06: e^0.06=1.06184. i=6.18%. So d^(12) is higher. The answer should be option 3.", "r": "Chapter 1 - Rate comparison"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "The present value of an annuity-certain payable annually in arrears for n years at rate i is denoted by:", "o": ["s angle n", "a angle n", "a-double-dot angle n", "a angle infinity"], "a": 1, "x": "a angle n = (1 - v^n)/i is the PV of an annuity-immediate (in arrears). s angle n is the accumulation. a-double-dot angle n = (1 - v^n)/d for annuity-due (in advance).", "r": "Chapter 2 - Annuity notation"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "A continuous payment stream paying at rate rho(t) from t=a to t=b. Its PV at t=0 is:", "o": ["integral rho(t) dt", "integral rho(t) e^(-delta t) dt", "integral rho(t) v^t dt with v = e^(-delta)", "Both B and C are equivalent"], "a": 3, "x": "PV = integral from a to b of rho(t) x exp(-integral from 0 to t of delta(s)ds) dt. With constant delta, this becomes integral rho(t) e^(-delta t) dt. B and C are equivalent since v^t = e^(-delta t).", "r": "Chapter 2 - Continuous payment stream PV"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "An annuity pays 500 quarterly in advance for 5 years. Given i^(4)=8%, the total PV uses:", "o": ["500 x 20 payments x v^0.25 each", "500 x a-double-dot 20 at quarterly effective rate 2%", "500 x a 20 at 2% effective quarterly", "Simple average of 20 payments"], "a": 1, "x": "Quarterly in advance, 500 per quarter, 20 periods. Quarterly rate = i^(4)/4 = 2%. For annuity-due: PV = 500 x a-double-dot 20 at 2% = 500 x (1-v^20)/d where d = i/(1+i) = 0.02/1.02.", "r": "Chapter 2 - Quarterly annuity-due"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "s angle n (accumulation of 1 p.a. in arrears for n years) equals:", "o": ["(1+i)^n x a angle n", "a angle n / (1+i)^n", "((1+i)^n - 1)/i", "(1 - v^n)/i"], "a": 2, "x": "s angle n = ((1+i)^n - 1)/i. Relationship: s angle n = (1+i)^n x a angle n. Think: discount PV to t=0 then accumulate to t=n.", "r": "Chapter 2 - Annuity accumulation"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "PV of a perpetuity of 1 p.a. in arrears at rate i equals:", "o": ["1/i", "1/d", "i", "1/i - 1"], "a": 0, "x": "a angle infinity = lim(n->inf) (1-v^n)/i = 1/i. Intuition: a perpetual stream of 1/year discounted at rate i has PV = 1/i. Annuity-due perpetuity = 1/d.", "r": "Chapter 2 - Perpetuity"}, {"t": "Annuities", "s": 2, "ty": "fill", "q": "The accumulation of 1 p.a. paid continuously for n years at force delta is s-bar angle n = ___", "a": "(e^(delta n)-1)/delta", "x": "s-bar angle n = integral from 0 to n of e^(delta(n-t)) dt = e^(delta n) x integral e^(-delta t) dt = e^(delta n)(1-e^(-delta n))/delta = (e^(delta n)-1)/delta. This equals a-bar angle n x e^(delta n).", "r": "Chapter 2 - Continuous annuity accumulation"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "In a loan schedule with level annual instalments in arrears, the capital component of each payment:", "o": ["Remains constant", "Decreases over time", "Increases over time", "Is random each year"], "a": 2, "x": "Each payment = interest + capital. Interest = outstanding balance x i. As balance decreases, interest decreases. Since total payment is constant, capital repaid INCREASES over time.", "r": "Chapter 3 - Loan schedule capital pattern"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "A loan of L is repaid by level annual payments of X in arrears over n years at rate i. The loan outstanding after k payments is:", "o": ["X x a angle (n-k)", "L x (1+i)^k - X x s angle k", "X x a angle (n-k) at rate i", "L x (1+i)^k"], "a": 2, "x": "After k payments, outstanding = PV of remaining (n-k) payments = X x a angle (n-k). Equivalent: L(1+i)^k - X x s angle k (accumulated loan minus accumulated payments).", "r": "Chapter 3 - Outstanding loan balance"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "If a loan's interest rate increases mid-term while keeping the same instalment amount, the remaining term will:", "o": ["Stay the same", "Decrease", "Increase", "Be fully repaid immediately"], "a": 2, "x": "Higher rate means more interest per period, less capital repaid from the same instalment. Takes MORE periods to repay = term increases. Conversely, lower rate shortens the term.", "r": "Chapter 3 - Rate change impact on term"}, {"t": "Loan Repayment", "s": 3, "ty": "fill", "q": "A 16,000 loan is repaid over 10 years by level annual payments in arrears at 8% p.a. The annual repayment is ___ (2 d.p.)", "a": "2384.44", "x": "X = L / a angle 10 at 8%. v = 1/1.08 = 0.925926, v^10 = 0.46319. a angle 10 = (1-0.46319)/0.08 = 6.7101. X = 16000/6.7101 = 2384.44. Formula: X = L x i / (1 - v^n).", "r": "Chapter 3 - Level repayment calculation"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "The capital repaid in the k-th year of a level annuity loan equals:", "o": ["X x v^(n-k+1)", "X x v^(n-k)", "X x (1 - v^(n-k+1))", "X x v^k"], "a": 0, "x": "Capital at end of year k = X x v^(n-k+1). From the loan schedule recurrence: interest = opening balance x i, capital = X - interest. The capital sequence is a geometric series: X v^n, X v^(n-1), ..., X v.", "r": "Chapter 3 - Loan schedule capital sequence"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "For a loan with changing interest rates, the new level payment after a rate change is:", "o": ["Old payment x (new rate / old rate)", "Outstanding balance / a angle (remaining term) at new rate", "(Old payment + new interest) / 2", "Outstanding balance x new rate x remaining years"], "a": 1, "x": "After a rate change, new payment = current outstanding balance / annuity factor at new rate for remaining term. Same logic as original loan calculation: recalculate the level payment needed to amortize the current balance.", "r": "Chapter 3 - Loan rate change recalculation"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "In a loan schedule, the interest component in year k equals:", "o": ["X - outstanding(k-1) x i", "outstanding(k-1) x i", "X x i", "L x i / n"], "a": 1, "x": "Interest in year k = outstanding balance at start of year k x i. This is the core recurrence: interest first, then subtract from X to get capital repaid, then subtract capital from balance.", "r": "Chapter 3 - Loan interest calculation"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "A bond pays annual coupons of 4% in arrears and is redeemed at 103%. For a 1000 nominal bond, the redemption payment is:", "o": ["1000", "1030", "1040", "1070"], "a": 1, "x": "Redeemed at 103% means redemption = nominal x 103% = 1000 x 1.03 = 1030. The 4% coupon (in arrears) = 40 per year. Redemption price and coupon rate are independent concepts.", "r": "Chapter 4 - Bond basics"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "A 2-year bond has price 1050 (per 1000 nominal), coupon 4% p.a. in arrears, redeemed at 103%. The yield y satisfies:", "o": ["1050 = 40/(1+y1) + 1070/(1+y2)^2", "1050 = 40/(1+y) + 1070/(1+y)^2", "1050 = 40v + 1030v^2 at rate y", "1050 = 40 a angle 2 + 1030 v^2 at rate y"], "a": 1, "x": "Bond pricing: P = sum(C x v^t) + R x v^n. Annual coupon = 1000 x 4% = 40. Redemption = 1000 x 103% = 1030. Year 2 cash flow = 40 + 1030 = 1070. Equation: 1050 = 40/(1+y) + 1070/(1+y)^2.", "r": "Chapter 4 - Bond yield equation"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "The 1-year forward rate f(1,2) (from year 1 to year 2) in terms of spot rates y1 and y2 is:", "o": ["(1+y2)^2/(1+y1) - 1", "(1+y1)(1+y2) - 1", "(y1+y2)/2", "(1+y2)/(1+y1) - 1"], "a": 0, "x": "No-arbitrage: (1+y1)(1+f(1,2)) = (1+y2)^2. So f(1,2) = (1+y2)^2/(1+y1) - 1. Under continuous compounding: f = (y2 t2 - y1 t1)/(t2-t1).", "r": "Chapter 4 - Forward rate formula"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "If the yield curve is upward sloping (y1 < y2 < y3), the forward rate f(1,2) is:", "o": ["Less than y2", "Equal to y2", "Greater than y2", "Cannot be determined"], "a": 2, "x": "(1+f(1,2)) = (1+y2)^2/(1+y1). When y2 > y1: (1+y2)^2/(1+y1) > (1+y2)^2/(1+y2) = 1+y2. So f(1,2) > y2. Upward sloping yield curve means forward rates exceed spot rates.", "r": "Chapter 4 - Forward rate and yield curve"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "Redington's conditions for immunisation require:", "o": ["PV assets = PV liabilities only", "PV assets = PV liabilities AND DMT assets >= DMT liabilities", "PV assets = PV liabilities AND DMT assets = DMT liabilities AND convexity assets > convexity liabilities", "PV assets > PV liabilities"], "a": 2, "x": "Redington's three conditions: (1) PV assets = PV liabilities; (2) DMT (volatility/duration) of assets = DMT of liabilities; (3) Convexity of assets > Convexity of liabilities. Condition (3) ensures asset value stays above liabilities under rate changes.", "r": "Chapter 4 - Redington immunisation conditions"}, {"t": "Bonds", "s": 2, "ty": "fill", "q": "For a zero-coupon bond, the Macaulay duration equals its ___", "a": "term to maturity", "x": "A zero-coupon bond has only one cash flow at maturity, so duration = term to maturity. For coupon bonds, duration < maturity (because interim coupons bring the average receipt time forward).", "r": "Chapter 4 - Zero-coupon bond duration"}, {"t": "Bonds", "s": 2, "ty": "fill", "q": "Redington's second condition: the DMT (volatility) of assets must ___ the DMT of liabilities", "a": "equal", "x": "Redington condition (2): volatility/duration of assets = volatility/duration of liabilities. This hedges first-order interest rate risk. Condition (1): PV equality. Condition (3): convexity of assets > convexity of liabilities.", "r": "Chapter 4 - Redington condition 2"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "Duration (or volatility) of a bond measures:", "o": ["The bond's maturity", "The weighted average time to receipt of cash flows", "The bond's yield to maturity", "The bond's coupon rate"], "a": 1, "x": "Duration = sum(t x PV(CF_t)) / sum(PV(CF_t)), i.e., weighted average time to receipt of cash flows (weights = present value of each cash flow). It measures interest rate sensitivity.", "r": "Chapter 4 - Duration definition"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "The variance of a two-asset portfolio with weights xA and xB is:", "o": ["xA^2 VA + xB^2 VB", "xA^2 VA + xB^2 VB + 2 xA xB CAB", "xA VA + xB VB + CAB", "VA + VB + 2 CAB"], "a": 1, "x": "Var(portfolio) = xA^2 VA + xB^2 VB + 2 xA xB CAB where CAB = Cov(RA,RB). Three terms: A's variance contribution, B's variance contribution, cross-term from covariance. Core formula in portfolio theory.", "r": "Chapter 5 - Portfolio variance"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "The weight xA that minimizes a two-asset portfolio variance is:", "o": ["(VB - CAB) / (VA + VB - 2 CAB)", "VA / (VA + VB)", "(VB + CAB) / (VA + VB + 2 CAB)", "1/2"], "a": 0, "x": "Minimize f(xA) = xA^2 VA + (1-xA)^2 VB + 2 xA(1-xA) CAB. Set f'(xA)=0: 2 xA VA - 2(1-xA)VB + 2 CAB(1-2xA) = 0. Solve: xA = (VB - CAB)/(VA + VB - 2 CAB). Derivation tested in exams.", "r": "Chapter 5 - Minimum variance portfolio"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "Diversification reduces portfolio risk when:", "o": ["Assets are perfectly positively correlated", "Assets have correlation less than +1", "Assets are independent", "Diversification always increases risk"], "a": 1, "x": "As long as correlation rho < 1, diversification reduces risk. Extreme case: rho = +1, portfolio variance = (xA sigmaA + xB sigmaB)^2, no diversification benefit. rho = -1 allows constructing zero-variance portfolio.", "r": "Chapter 5 - Diversification principle"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "If (1+i_t) is independently and lognormally distributed with E[log(1+i_t)] = mu and Var[log(1+i_t)] = sigma^2, then E[1+i_t] equals:", "o": ["e^mu", "e^(mu + sigma^2/2)", "mu + sigma^2/2", "e^(mu + sigma^2)"], "a": 1, "x": "Lognormal property: if log X ~ N(mu, sigma^2), then E[X] = exp(mu + sigma^2/2). Appears repeatedly in exam questions. Var[X] = exp(2mu+sigma^2)(exp(sigma^2)-1).", "r": "Chapter 5 - Lognormal mean"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "The expected accumulated value after n years of 1 invested with independent annual returns (1+i_t) ~ lognormal(mu, sigma^2) is:", "o": ["e^(n mu)", "e^(n mu + n sigma^2/2)", "(1+mu)^n", "e^(mu + sigma^2/2)"], "a": 1, "x": "S_n = product from t=1 to n of (1+i_t). Independent: E[S_n] = product of E[1+i_t] = (E[1+i_t])^n. E[1+i_t] = exp(mu + sigma^2/2). So E[S_n] = exp(n mu + n sigma^2/2).", "r": "Chapter 5 - Stochastic accumulation"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "For a two-asset portfolio, if rho_AB = -1, it is possible to achieve:", "o": ["Maximum possible variance", "Zero portfolio variance", "Negative expected return", "Infinite diversification"], "a": 1, "x": "With rho = -1: portfolio variance = (xA sigmaA - xB sigmaB)^2. Choose xA = sigmaB/(sigmaA+sigmaB) to make variance = 0, creating a perfect hedge.", "r": "Chapter 5 - Perfect negative correlation"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "The Security Market Line (SML) equation is:", "o": ["r_i = r_f + beta_i (r_M - r_f)", "r_i = beta_i x r_M", "r_i = r_f + sigma_i (r_M - r_f)", "r_i = r_M + beta_i"], "a": 0, "x": "SML: E[R_i] = r_f + beta_i (E[R_M] - r_f). r_f = risk-free rate, E[R_M] - r_f = Market Price of Risk, beta_i = systematic risk measure. This is the core CAPM conclusion.", "r": "Chapter 6 - Security Market Line"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "Beta (beta_i) of security i in CAPM is defined as:", "o": ["Var(R_i) / Var(R_M)", "Cov(R_i, R_M) / Var(R_M)", "Cov(R_i, R_M) / (sigma_i sigma_M)", "Var(R_M) / Cov(R_i, R_M)"], "a": 1, "x": "beta_i = Cov(R_i, R_M) / Var(R_M) = rho_iM x sigma_i / sigma_M. Beta measures sensitivity of asset i to the market portfolio. Note: correlation and beta are different -- beta also depends on sigma_i/sigma_M ratio.", "r": "Chapter 6 - Beta definition"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "If beta_i = 1.5, r_f = 5%, and E[R_M] = 12%, then E[R_i] according to CAPM is:", "o": ["12.0%", "15.5%", "18.0%", "17.0%"], "a": 1, "x": "E[R_i] = r_f + beta_i (E[R_M] - r_f) = 5% + 1.5 x (12% - 5%) = 5% + 1.5 x 7% = 5% + 10.5% = 15.5%. beta=1 means same risk as market; beta>1 means higher risk, higher return.", "r": "Chapter 6 - SML calculation"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "The relationship sum(pi_i beta_i) = 1 (where pi_i is asset i's weight in the market portfolio) shows:", "o": ["Weighted average beta of all assets = 1", "All betas must be positive", "Sum of betas = 1", "Market portfolio has zero beta"], "a": 0, "x": "sum pi_i beta_i = sum pi_i x Cov(R_i,R_M)/Var(R_M) = Cov(sum pi_i R_i, R_M)/Var(R_M) = Cov(R_M, R_M)/Var(R_M) = 1. This is a CAPM consistency condition tested in exams.", "r": "Chapter 6 - Market portfolio beta"}, {"t": "CAPM", "s": 3, "ty": "fill", "q": "In CAPM, if E[R_M] = 15%, r_f = 10%, and a stock has beta = 0.8, its expected return is ___%", "a": "14", "x": "E[R_i] = 10% + 0.8(15% - 10%) = 10% + 4% = 14%. beta<1 means the stock is defensive -- less volatile than the market, lower expected return.", "r": "Chapter 6 - Beta expected return"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "In CAPM, an asset with beta = 0 is:", "o": ["The market portfolio", "A risk-free asset", "An asset with no variance", "An asset perfectly correlated with the market"], "a": 1, "x": "beta=0 means Cov(R_i,R_M)=0, so E[R_i]=r_f (from SML). A zero-beta asset has expected return equal to the risk-free rate -- it is a risk-free asset (or market-uncorrelated).", "r": "Chapter 6 - Zero beta"}, {"t": "CAPM", "s": 3, "ty": "fill", "q": "In a CAPM market, r_f=9.44%. If asset 1 has E[R1]=16% and beta1=0.46, the Market Price of Risk equals ___% (1 d.p.)", "a": "14.3", "x": "MRP = (E[R1] - r_f)/beta1 = (16% - 9.44%)/0.46 = 6.56%/0.46 = 14.26% = approximately 14.3%. From J2Fin_Math 2023-24 exam data. Once MRP is known, any asset's expected return follows from SML.", "r": "Chapter 6 - Market Price of Risk"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "A utility function U(w) exhibits risk aversion when:", "o": ["U'(w) > 0", "U''(w) < 0", "U''(w) > 0", "U'(w) = 0"], "a": 1, "x": "Risk aversion iff U''(w) < 0 (diminishing marginal utility). U'(w) > 0 means non-satiation (more wealth is better), but that alone doesn't determine risk aversion. If U''(w) < 0, investor rejects fair gambles.", "r": "Chapter 7 - Risk aversion definition"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "The Absolute Risk Aversion (ARA) coefficient is defined as:", "o": ["-U''(w)/U'(w)", "-U'(w)/U''(w)", "U''(w)/U'(w)", "U'(w) x U'''(w)"], "a": 0, "x": "ARA(w) = -U''(w)/U'(w), the Arrow-Pratt coefficient. If ARA'(w) < 0: Decreasing ARA (DARA). If ARA'(w) = 0: Constant ARA (CARA). If ARA'(w) > 0: Increasing ARA (IARA).", "r": "Chapter 7 - ARA definition"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "U(w) = ln(w) for w > 0 exhibits:", "o": ["Constant absolute risk aversion", "Increasing absolute risk aversion", "Decreasing absolute risk aversion", "Zero risk aversion"], "a": 2, "x": "U'(w)=1/w, U''(w)=-1/w^2. ARA(w) = -(-1/w^2)/(1/w) = 1/w. ARA'(w) = -1/w^2 < 0, so it is DARA. RRA(w) = w x ARA(w) = 1 (constant), so it is CRRA.", "r": "Chapter 7 - ln(w) risk aversion"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "U(w) = 2 w^0.5 - 1 has which property?", "o": ["Increasing RRA", "Constant RRA", "Decreasing RRA", "Not risk averse"], "a": 1, "x": "U'(w)=w^(-0.5), U''(w)=-0.5 w^(-1.5). ARA(w)=0.5/w (DARA). RRA(w)=w x ARA(w)=0.5 (constant). So CRRA. This utility function was tested in the exam.", "r": "Chapter 7 - CRRA utility"}, {"t": "Utility Theory", "s": 3, "ty": "fill", "q": "For U(w) = ln(w), the Absolute Risk Aversion ARA(w) equals ___", "a": "1/w", "x": "U'(w)=1/w, U''(w)=-1/w^2. ARA = -U''/U' = -(-1/w^2)/(1/w) = 1/w. As wealth w increases, ARA decreases -- the wealthy can bear more absolute risk.", "r": "Chapter 7 - ARA calculation"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "An investor is offered a fair gamble (expected gain = 0). A risk-averse investor will:", "o": ["Always accept", "Accept if potential gain is large enough", "Reject the fair gamble", "Be indifferent"], "a": 2, "x": "Risk-averse utility is concave (U'' < 0). By Jensen: E[U(w+X)] < U(E[w+X]) = U(w) when E[X]=0. So reject fair gambles. They need positive expected return (risk premium) to accept.", "r": "Chapter 7 - Fair gamble rejection"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "The Relative Risk Aversion (RRA) coefficient is:", "o": ["-U''(w)/U'(w)", "-w U''(w)/U'(w)", "-U'(w)/U''(w)", "U''(w)/U'(w)"], "a": 1, "x": "RRA(w) = -w x U''(w)/U'(w) = w x ARA(w). RRA measures aversion to proportional wealth risk. CRRA means same risk preference proportion regardless of wealth level.", "r": "Chapter 7 - RRA definition"}, {"t": "Utility Theory", "s": 3, "ty": "fill", "q": "For U(w)=2 w^0.5-1, the Relative Risk Aversion RRA(w) equals ___", "a": "0.5", "x": "U'(w)=w^(-0.5), U''(w)=-0.5 w^(-1.5). RRA=-w x (-0.5 w^(-1.5))/w^(-0.5)=0.5 w^0=0.5=constant. So CRRA with value 0.5.", "r": "Chapter 7 - RRA calculation"}, {"t": "EMH & Other", "s": 1, "ty": "mc", "q": "The three forms of the Efficient Markets Hypothesis (EMH) are:", "o": ["Weak, semi-strong, strong", "Primary, secondary, tertiary", "Bull, bear, neutral", "Technical, fundamental, quantitative"], "a": 0, "x": "Weak EMH: prices reflect all historical trading info (technical analysis useless). Semi-strong: prices reflect all public info (fundamental analysis useless). Strong: prices reflect all info including insider info. Tested directly in exam.", "r": "Chapter 8 - Three EMH forms"}, {"t": "EMH & Other", "s": 1, "ty": "mc", "q": "Under the weak form of EMH:", "o": ["Technical analysis can generate excess returns", "Fundamental analysis is useless", "Past price patterns cannot predict future returns", "Insider trading is allowed"], "a": 2, "x": "Weak EMH: historical price and volume data already reflected in prices, so technical analysis cannot consistently generate excess returns. Fundamental analysis may still work (under weak form).", "r": "Chapter 8 - Weak EMH"}, {"t": "EMH & Other", "s": 1, "ty": "mc", "q": "The semi-strong form of EMH implies that:", "o": ["Only past prices are reflected", "All publicly available information is reflected", "All information including insider info is reflected", "Markets are perfectly predictable"], "a": 1, "x": "Semi-strong EMH: prices reflect all publicly available information (financial statements, news, economic data). Fundamental analysis cannot consistently beat the market. Only non-public (insider) info can generate excess returns.", "r": "Chapter 8 - Semi-strong EMH"}, {"t": "EMH & Other", "s": 1, "ty": "fill", "q": "In the strong form of EMH, even ___ information is reflected in stock prices", "a": "insider", "x": "Strong EMH: ALL information including non-public insider info is reflected in prices. Even insider trading cannot generate excess returns. Few real markets satisfy strong-form EMH.", "r": "Chapter 8 - Strong EMH"}, {"t": "EMH & Other", "s": 1, "ty": "mc", "q": "The key assumption of lognormal returns in financial models means:", "o": ["Returns are always positive", "Log-returns are normally distributed", "Prices are normally distributed", "Returns have zero mean"], "a": 1, "x": "Lognormal assumption: log(1+i_t) ~ N(mu, sigma^2), i.e., continuously compounded returns are normally distributed. Ensures 1+i_t > 0 (no negative prices). Allows using normal distribution properties in derivations.", "r": "Chapter 5/8 - Lognormal assumption"}, {"t": "EMH & Other", "s": 1, "ty": "mc", "q": "According to CAPM, which risk matters for pricing?", "o": ["Total risk (sigma)", "Systematic risk (beta)", "Unsystematic risk", "Default risk"], "a": 1, "x": "CAPM insight: only systematic risk is priced. Unsystematic risk can be diversified away for free. Investors should only be compensated for bearing non-diversifiable market risk (beta).", "r": "Chapter 6 - Systematic vs unsystematic"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "If $i=0.06$, the equivalent force of interest $\\delta$ is approximately:", "o": ["0.0583", "0.0600", "0.0618", "0.0562"], "a": 0, "x": "$\\delta = \\ln(1+i) = \\ln(1.06) \\approx 0.05827$. Key relationship: $1+i = e^{\\delta}$, so $\\delta = \\ln(1+i)$. Conversely $i = e^{\\delta}-1$.", "r": "Chapter 1 - Force of interest vs effective rate"}, {"t": "Interest Rates", "s": 3, "ty": "fill", "q": "The nominal rate $i^{(4)}$ equivalent to $i=10\\%$ is ___% (2 d.p.)", "a": "9.65", "x": "$(1+i^{(4)}/4)^4=1.10$. $1+i^{(4)}/4=(1.10)^{1/4}=1.02411$. $i^{(4)}/4=0.02411$. $i^{(4)}=0.09645=9.65\\%$. Note that $i^{(m)}$ decreases as $m$ increases.", "r": "Chapter 1 - Nominal rate from effective"}, {"t": "Interest Rates", "s": 3, "ty": "mc", "q": "A payment of 100 due in 10 years at $\\delta=0.05$ has present value:", "o": ["60.65", "61.39", "95.12", "50.00"], "a": 0, "x": "$PV = 100 \\times e^{-\\delta t} = 100 \\times e^{-0.5} = 100 \\times 0.60653 = 60.65$. With discrete compounding: $PV = 100/(1+i)^{10}$; with continuous: $PV = 100 e^{-\\delta t}$. Same result when $i$ and $\\delta$ are equivalent.", "r": "Chapter 1 - Continuous compounding PV"}, {"t": "Interest Rates", "s": 2, "ty": "mc", "q": "If $i^{(4)} = 8\\%$, the annual effective rate $i$ is approximately:", "o": ["8.00%", "8.24%", "8.16%", "8.32%"], "a": 1, "x": "$(1+0.02)^4 = 1+i$. $(1.02)^4 = 1.08243 = 1+i$. $i = 8.24\\%$. Higher compounding frequency gives higher effective rate.", "r": "Chapter 1 - Effective from nominal"}, {"t": "Interest Rates", "s": 2, "ty": "mc", "q": "The relationship $d = i/(1+i)$ implies that $d$ is always:", "o": ["Greater than i", "Equal to i", "Less than i", "Twice i"], "a": 2, "x": "$d = i/(1+i) = iv$. Since $v = 1/(1+i) < 1$ (for $i>0$), $d < i$. For example, $i=5\\% \\Rightarrow d=0.05/1.05=4.76\\%$.", "r": "Chapter 1 - Discount vs interest"}, {"t": "Interest Rates", "s": 3, "ty": "fill", "q": "If $\\delta(t) = 0.04 + 0.001t$, the accumulation factor $A(0,10)$ is $e^{___}$ (3 d.p.)", "a": "0.45", "x": "$A(0,10)=\\exp(\\int_0^{10}\\delta(t)dt)=\\exp(\\int_0^{10}(0.04+0.001t)dt)=\\exp([0.04t+0.0005t^2]_0^{10})=\\exp(0.4+0.05)=e^{0.45}$.", "r": "Chapter 1 - Accumulation with variable delta"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "An annuity-due (in advance) of 1 for n years has PV $\\ddot{a}_{\\angl{n}}$ equal to:", "o": ["$(1-v^n)/i$", "$(1-v^n)/d$ where $d=i/(1+i)$", "$(1+i)^n \\times a_{\\angl{n}}$", "$v \\times a_{\\angl{n}}$"], "a": 1, "x": "$\\ddot{a}_{\\angl{n}} = (1-v^n)/d$ where $d = i/(1+i)$. Also $\\ddot{a}_{\\angl{n}} = (1+i)a_{\\angl{n}}$. The advance factor is $(1+i)$ since each payment occurs one period earlier.", "r": "Chapter 2 - Annuity-due PV"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "For an annuity payable p times per year, the PV at rate i is $a^{(p)}_{\\angl{n}} \\approx a_{\\angl{n}} + \\frac{p-1}{2p}$. What happens as $p \\to \\infty$?", "o": ["PV approaches 0", "PV approaches $\\bar{a}_{\\angl{n}}$ (continuous annuity)", "PV becomes infinite", "PV equals $a_{\\angl{n}}$"], "a": 1, "x": "As $p \\to \\infty$, payments become continuous: $a^{(p)}_{\\angl{n}} \\to \\bar{a}_{\\angl{n}} = (1-v^n)/\\delta$. The approximation $a_{\\angl{n}} + (p-1)/(2p) \\to a_{\\angl{n}} + 1/2$ does NOT give the correct continuous limit; use the $\\delta$ formula.", "r": "Chapter 2 - Frequency and continuous limit"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "The accumulated value after n years of 1 p.a. paid continuously at force $\\delta$ is:", "o": ["$(e^{\\delta n}-1)/\\delta$", "$(1-e^{-\\delta n})/\\delta$", "$e^{\\delta n} \\times (1-e^{-\\delta n})/\\delta$", "$\\delta/(e^{\\delta n}-1)$"], "a": 0, "x": "$\\bar{s}_{\\angl{n}} = \\int_0^n e^{\\delta(n-t)}dt = e^{\\delta n}\\int_0^n e^{-\\delta t}dt = e^{\\delta n}(1-e^{-\\delta n})/\\delta = (e^{\\delta n}-1)/\\delta$. Also $\\bar{s}_{\\angl{n}} = \\bar{a}_{\\angl{n}} \\times e^{\\delta n}$.", "r": "Chapter 2 - Continuous annuity accumulation"}, {"t": "Annuities", "s": 2, "ty": "fill", "q": "If $i=5\\%$, the PV of a perpetuity-due of 1 p.a. is ___", "a": "21", "x": "$\\ddot{a}_{\\angl{\\infty}} = 1/d$ where $d = i/(1+i) = 0.05/1.05 = 0.04762$. So $\\ddot{a}_{\\angl{\\infty}} = 1/0.04762 = 21.0$. Compare: perpetuity in arrears $a_{\\angl{\\infty}} = 1/i = 20$. The advance adds exactly 1.", "r": "Chapter 2 - Perpetuity-due"}, {"t": "Annuities", "s": 2, "ty": "mc", "q": "A 3-year sponsorship grant pays 50,000 p.a.: Year 1 continuously, Year 2 monthly in advance, Year 3 half-yearly in advance. The PV at $t=0$ with $i^{(4)}=8\\%$ requires:", "o": ["A single PV formula", "PV of each year separately with appropriate annuity factors", "Simple average of the three payments", "Only the continuous annuity formula"], "a": 1, "x": "Each year's payment pattern is different: Year 1 uses $\\bar{a}_{\\angl{1}}$ at $\\delta$ equivalent to $i^{(4)}$; Year 2 uses $\\ddot{a}^{(12)}_{\\angl{1}}$ discounted 1 year; Year 3 uses $\\ddot{a}^{(2)}_{\\angl{1}}$ discounted 2 years. Sum all three PVs.", "r": "Chapter 2 - Mixed payment patterns"}, {"t": "Annuities", "s": 2, "ty": "fill", "q": "For $i=6\\%$, $a_{\\angl{10}} \\times s_{\\angl{10}}$ equals $1/i \\times s_{\\angl{10}} \\times (1-v^{10})$ which simplifies to $a_{\\angl{10}} \\times ((1.06)^{10}-1)/0.06$. If $a_{\\angl{10}}=7.3601$, then $s_{\\angl{10}}=$ ___ (2 d.p.)", "a": "13.18", "x": "$s_{\\angl{10}} = a_{\\angl{10}} \\times (1+i)^{10} = 7.3601 \\times 1.06^{10} = 7.3601 \\times 1.7908 = 13.18$. Also $s_{\\angl{10}} = ((1.06)^{10}-1)/0.06 = (1.7908-1)/0.06 = 13.18$. Both formulas give same result.", "r": "Chapter 2 - Annuity accumulation factor"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "A loan of L is repaid by level instalments X p.a. in arrears at rate i for n years. The interest paid in year k is:", "o": ["$X \\times v^{n-k+1}$", "$X \\times (1-v^{n-k+1})$", "$L \\times i$ every year", "$X \\times i$"], "a": 1, "x": "Interest in year k = $X(1-v^{n-k+1})$. Since capital in year k = $X v^{n-k+1}$ and total payment = X, interest = $X - X v^{n-k+1} = X(1-v^{n-k+1})$. Interest decreases each year.", "r": "Chapter 3 - Loan interest formula"}, {"t": "Loan Repayment", "s": 3, "ty": "fill", "q": "For a loan of 12,033.56 repaid by 20 level payments of 1,000 p.a. in arrears, the initial interest rate is ___% p.a.", "a": "5", "x": "$L = X \\times a_{\\angl{20}}$. $12033.56 = 1000 \\times a_{\\angl{20}}$. $a_{\\angl{20}} = 12.03356$. Test $i=5\\%$: $a_{\\angl{20}} = (1-1.05^{-20})/0.05 = (1-0.37689)/0.05 = 12.4622$. Test $i=6\\%$: $(1-1.06^{-20})/0.06 = 11.47$. So $i=5\\%$ is correct. From J2Fin_Math 2023-24 exam.", "r": "Chapter 3 - Finding rate from annuity"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "After 10 years of a 20-year level loan at 5%, the rate increases to 7% for the remaining term. The new payment (if term stays at 10 years):", "o": ["Stays at 1,000", "Equals outstanding / $a_{\\angl{10}}$ at 7%", "Equals 1,000 x 7/5", "Equals outstanding / $a_{\\angl{10}}$ at 5%"], "a": 1, "x": "New payment = outstanding balance after 10 years / $a_{\\angl{10}}$ at new rate 7%. Outstanding = $X \\times a_{\\angl{10}}$ at 5% (original rate). Recalculate with $a_{\\angl{10}}$ at 7%. This is a core exam pattern.", "r": "Chapter 3 - Rate change recalculation"}, {"t": "Loan Repayment", "s": 3, "ty": "mc", "q": "If a loan interest rate drops while keeping the same annual instalment, the final instalment is typically:", "o": ["Equal to the level payment", "Larger than the level payment", "Smaller than the level payment", "Zero"], "a": 2, "x": "Lower rate means less interest, more capital repaid from each payment. The loan is repaid faster, and the final payment only needs to cover the remaining balance, which is LESS than the normal level payment.", "r": "Chapter 3 - Final instalment after rate drop"}, {"t": "Loan Repayment", "s": 2, "ty": "mc", "q": "The total interest paid over the life of a level annuity loan equals:", "o": ["$nX$", "$nX - L$", "$L \\times i \\times n$", "$X \\times n - L$"], "a": 1, "x": "Total payments = $n \\times X$. Original loan = $L$. Total interest = total payments - loan = $nX - L$. This is because every payment is either interest or capital, and total capital repaid equals the original loan.", "r": "Chapter 3 - Total interest"}, {"t": "Loan Repayment", "s": 2, "ty": "fill", "q": "If the capital repaid in year k of a level loan is $C_k$, then $C_{k+1}/C_k =$ ___", "a": "1+i", "x": "$C_k = X v^{n-k+1}$. $C_{k+1} = X v^{n-k}$. So $C_{k+1}/C_k = v^{-1} = 1+i$. Capital repayments form a geometric progression with ratio $1+i$.", "r": "Chapter 3 - Capital repayment ratio"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "For a bond priced at par (P = nominal), the yield to maturity equals:", "o": ["The coupon rate", "The redemption yield only", "The nominal rate", "Half the coupon rate"], "a": 0, "x": "When price = nominal (par), $i = C/N$ where C = coupon and N = nominal. The yield = coupon rate. This is because $1 = Ca_{\\angl{n}} + Rv^n$, and if $C = iR$, then $P = R$.", "r": "Chapter 4 - Par bond yield"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "Three bonds (A: 1yr, B: 2yr, C: 3yr) all pay 4% coupon in arrears and redeem at 103%. Prices are 1040, 1050, 1060 per 1000 nominal. To find spot rates:", "o": ["Use the 3-year bond alone", "Solve sequentially: y1 from A, then y2 from B using y1, then y3 from C using y1,y2", "Average all three prices", "Use only the longest bond"], "a": 1, "x": "Bootstrapping: Bond A (1yr): $1040 = 1070/(1+y_1)$ gives $y_1$. Bond B (2yr): $1050 = 40/(1+y_1) + 1070/(1+y_2)^2$ gives $y_2$ (using known $y_1$). Bond C: use known $y_1, y_2$ to get $y_3$. This is the standard exam pattern for spot rate extraction.", "r": "Chapter 4 - Bootstrapping spot rates"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "Convexity of a bond measures:", "o": ["The first-order sensitivity to interest rates", "The curvature of the price-yield relationship", "The bond's maturity", "The coupon payment frequency"], "a": 1, "x": "Convexity = $\\frac{1}{P}\\frac{d^2P}{di^2}$. It measures the curvature (second derivative) of the price-yield relationship. Redington's third condition requires convexity(assets) > convexity(liabilities) to protect against large rate changes.", "r": "Chapter 4 - Convexity"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "The volatility (DMT) of a bond is defined as:", "o": ["$\\sum t \\times PV(CF_t) / \\sum PV(CF_t)$", "$-\\frac{1}{P}\\frac{dP}{di}$", "Duration divided by $(1+i)$", "The bond's term to maturity"], "a": 1, "x": "Volatility = $-\\frac{1}{P}\\frac{dP}{di} = \\frac{\\text{Macaulay Duration}}{1+i}$. Also called Modified Duration. It measures the percentage price change per unit change in yield. Redington uses volatility (= DMT), not Macaulay duration.", "r": "Chapter 4 - Volatility / DMT"}, {"t": "Bonds", "s": 2, "ty": "fill", "q": "For a 4-year zero-coupon bond with redemption 100 and spot rate $y_4=7\\%$, the price is ___ (2 d.p.)", "a": "76.29", "x": "$P = 100/(1+y_4)^4 = 100/1.07^4 = 100/1.3108 = 76.29$. Zero-coupon bonds have only one cash flow, making them the building blocks of the term structure.", "r": "Chapter 4 - Zero-coupon pricing"}, {"t": "Bonds", "s": 2, "ty": "mc", "q": "An investor immunises a liability of 3,200 at t=4 and Z at t=2 by buying zero-coupon bonds at t=2, 3, and 4. Which condition is Redington's FIRST?", "o": ["PV(assets) = PV(liabilities)", "DMT(assets) = DMT(liabilities)", "Convexity(assets) > Convexity(liabilities)", "Face value equality"], "a": 0, "x": "Redington condition (1): PV equality. Condition (2): DMT equality. Condition (3): Convexity inequality. All three must hold. In exam Q3(b) of J2MF_Math, students verify all three conditions numerically.", "r": "Chapter 4 - Redington conditions order"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "If $(1+i_t) \\sim \\text{Lognormal}(\\mu, \\sigma^2)$ i.i.d., then $\\text{Var}[S_n] = (e^{2\\mu+\\sigma^2})^n \\times (e^{n\\sigma^2}-1)$. This equals:", "o": ["$(\\text{E}[1+i_t])^{2n} \\times (e^{n\\sigma^2}-1)$", "$(e^{2\\mu+\\sigma^2})^n - e^{2n\\mu}$", "$(e^{\\sigma^2}-1)^n$", "$n \\times e^{2\\mu+\\sigma^2}$"], "a": 1, "x": "$\\text{Var}[S_n] = (v+m^2)^n - m^{2n}$ where $m = \\text{E}[1+i_t]$ and $v = \\text{Var}[1+i_t]$. With lognormal: $m = e^{\\mu+\\sigma^2/2}$, $v+m^2 = e^{2\\mu+2\\sigma^2}$. So $\\text{Var}[S_n] = e^{n(2\\mu+2\\sigma^2)} - e^{2n(\\mu+\\sigma^2/2)}$. Simplifying gives the formula. This was derived in exam J2Fin_Math Q3.", "r": "Chapter 5 - Lognormal accumulation variance"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "For a portfolio of N equally weighted assets each with variance V and average covariance C, the portfolio variance is:", "o": ["$V$", "$V/N + (1-1/N)C$", "$V/N$", "$C$"], "a": 1, "x": "$\\text{Var} = \\sum(1/N)^2 V + \\sum\\sum_{i\\neq j}(1/N)^2 C = N(1/N^2)V + N(N-1)(1/N^2)C = V/N + (1-1/N)C$. As $N \\to \\infty$, portfolio variance $\\to C$ -- only systematic (covariance) risk remains.", "r": "Chapter 5 - Diversification limit"}, {"t": "Portfolio Theory", "s": 2, "ty": "fill", "q": "If E[1+i_t] = 1.06, E[(1+i_t)^2] = 1.13, then Var[1+i_t] = ___ (4 d.p.)", "a": "0.0064", "x": "$\\text{Var}[1+i_t] = \\text{E}[(1+i_t)^2] - (\\text{E}[1+i_t])^2 = 1.13 - 1.06^2 = 1.13 - 1.1236 = 0.0064$. This is $v$ in the formula $\\text{Var}[S_n] = (v+m^2)^n - m^{2n}$.", "r": "Chapter 5 - Variance from moments"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "If $\\log(1+i_t) \\sim N(0.04, 0.0004)$, then $\\text{E}[1+i_t]$ is approximately:", "o": ["$e^{0.04}$", "$e^{0.0402}$", "0.04", "$e^{0.04} + 0.0002$"], "a": 1, "x": "$\\text{E}[1+i_t] = \\exp(\\mu + \\sigma^2/2) = \\exp(0.04 + 0.0004/2) = \\exp(0.0402) \\approx 1.0410$. Note $\\mu=0.04$ is the mean of $\\log(1+i_t)$, NOT of $(1+i_t)$ itself. The $\\sigma^2/2$ adjustment is crucial.", "r": "Chapter 5 - Lognormal mean calculation"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "The Central Limit Theorem applied to $\\log(1+i_t)$ implies that over many periods, $S_n = \\prod(1+i_t)$ is approximately:", "o": ["Normal", "Lognormal", "Uniform", "Poisson"], "a": 1, "x": "$\\log S_n = \\sum \\log(1+i_t)$. By CLT, the sum of i.i.d. random variables is approximately Normal. Therefore $S_n = e^{\\text{Normal}}$ is approximately Lognormal. This is the theoretical foundation for modeling long-term returns as lognormal.", "r": "Chapter 5 - CLT and lognormal"}, {"t": "Portfolio Theory", "s": 2, "ty": "mc", "q": "An insurance company invests half its premiums in fixed 3% and half in assets with uncertain return $i_t \\sim \\text{Lognormal}(\\mu=0.034, \\sigma=0.03)$. After 5 years, the expected accumulation of the uncertain half is:", "o": ["$425000 \\times (1.035)^5$", "$425000 \\times e^{5\\mu}$", "$425000 \\times e^{5(\\mu+\\sigma^2/2)}$", "$425000 \\times (1+\\mu)^5$"], "a": 2, "x": "$\\text{E}[S_5] = \\text{E}[\\prod(1+i_t)] = (\\text{E}[1+i_t])^5$. $\\text{E}[1+i_t] = e^{\\mu+\\sigma^2/2} = e^{0.034+0.00045} = e^{0.03445} \\approx 1.03505$. So $\\text{E}[S_5] = 425000 \\times e^{5(\\mu+\\sigma^2/2)}$. Must use $\\mu+\\sigma^2/2$, not just $\\mu$.", "r": "Chapter 5 - Insurance accumulation"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "The Capital Market Line (CML) differs from the SML because CML uses:", "o": ["Beta on the x-axis", "Expected return on the y-axis with beta on the x-axis", "Standard deviation on the x-axis", "Risk-free rate only"], "a": 2, "x": "CML: $E[R_p] = r_f + \\frac{E[R_M]-r_f}{\\sigma_M}\\sigma_p$ uses standard deviation (total risk). SML: $E[R_i] = r_f + \\beta_i(E[R_M]-r_f)$ uses beta (systematic risk). CML applies only to efficient portfolios; SML applies to ALL assets.", "r": "Chapter 6 - CML vs SML"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "In a CAPM market with n assets, the weight of asset i in the market portfolio is $\\pi_i$. If $\\beta_i = 0.46$ and $\\beta_j = 1.36$ for all i,j, which is more heavily weighted?", "o": ["Equal weights", "Asset with higher beta gets higher weight", "Asset with lower beta gets higher weight", "Cannot tell from beta alone"], "a": 3, "x": "$\\pi_i$ depends on market capitalization, not directly on $\\beta_i$. The constraint $\\sum \\pi_i \\beta_i = 1$ must hold, but individually, $\\pi_i$ is the market weight. High beta does not imply high weight. Exam Q4(c) from J2Fin_Math asks to find weights GIVEN the betas, which requires additional data.", "r": "Chapter 6 - Market weights vs beta"}, {"t": "CAPM", "s": 3, "ty": "fill", "q": "If $E[R_M]=15\\%$, $r_f=5\\%$, and a stock with $\\beta=1.2$ has an actual expected return of 18%, then according to CAPM, the stock is ___ (overvalued / undervalued)", "a": "undervalued", "x": "CAPM required: $E[R]=5\\%+1.2(15\\%-5\\%)=17\\%$. Actual 18% > 17%, so the stock offers MORE return than CAPM predicts for its risk level. This means it's UNDERVALUED (a bargain). Investors will buy, driving price up and expected return down to the SML.", "r": "Chapter 6 - CAPM valuation"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "If an asset plots ABOVE the Security Market Line, it is:", "o": ["Overvalued", "Undervalued", "Fairly valued", "Risk-free"], "a": 1, "x": "Above SML means actual return > CAPM-required return. The asset is UNDERVALUED (offering more return than its risk warrants). Investors will buy it, driving price up and expected return down until it lies on the SML. Below SML = overvalued.", "r": "Chapter 6 - SML and valuation"}, {"t": "CAPM", "s": 3, "ty": "mc", "q": "In CAPM, the expected return on a zero-beta portfolio equals:", "o": ["0", "$r_f$, the risk-free rate", "$E[R_M]$", "The market risk premium"], "a": 1, "x": "From SML: $E[R_i] = r_f + \\beta_i(E[R_M]-r_f)$. If $\\beta_i=0$, then $E[R_i]=r_f$. A zero-beta portfolio has no systematic risk and thus earns only the risk-free rate. Does not mean zero total risk, only zero market correlation.", "r": "Chapter 6 - Zero-beta portfolio"}, {"t": "CAPM", "s": 2, "ty": "fill", "q": "A stock has $\\sigma_i=0.3$, $\\sigma_M=0.2$, $\\rho_{iM}=0.8$. Its $\\beta_i=$ ___", "a": "1.2", "x": "$\\beta_i = \\rho_{iM} \\times \\sigma_i/\\sigma_M = 0.8 \\times 0.3/0.2 = 0.8 \\times 1.5 = 1.2$. Beta combines correlation AND relative volatility. Even high correlation ($\\rho=0.8$) with lower relative volatility ($\\sigma_i/\\sigma_M=1.5$) gives $\\beta=1.2$.", "r": "Chapter 6 - Beta from correlation"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "For $U(w) = -e^{-aw}$ (CARA utility), the absolute risk aversion ARA(w) equals:", "o": ["$a$", "$1/w$", "$aw$", "$a/w$"], "a": 0, "x": "$U'(w)=ae^{-aw}$, $U''(w)=-a^2 e^{-aw}$. $\\text{ARA} = -U''/U' = a^2 e^{-aw}/(a e^{-aw}) = a$ (constant). This is CARA: constant absolute risk aversion. The exponential utility function is the only CARA utility.", "r": "Chapter 7 - CARA utility"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "For a gamble with +100 (p=0.2), 0 (p=0.7), -200 (p=0.1), the expected wealth change is 0. A risk-averse investor with U(w)=ln(w) and w=300 should:", "o": ["Accept the gamble", "Reject the gamble", "Be indifferent", "Need more information"], "a": 1, "x": "$\\text{E}[U(300+X)] = 0.2\\ln(400) + 0.7\\ln(300) + 0.1\\ln(100) = 0.2 \\times 5.991 + 0.7 \\times 5.703 + 0.1 \\times 4.605 = 1.198+3.992+0.461 = 5.651$. $U(300)=\\ln(300)=5.703$. Since $5.651 < 5.703$, reject the fair gamble.", "r": "Chapter 7 - Expected utility calculation"}, {"t": "Utility Theory", "s": 3, "ty": "mc", "q": "The certainty equivalent (CE) of a gamble satisfies:", "o": ["$U(CE) = E[wealth]$", "$U(CE) = E[U(wealth)]$", "$CE = E[wealth]$", "$CE = U(E[wealth])$"], "a": 1, "x": "CE is the guaranteed amount that gives the SAME utility as the expected utility of the gamble: $U(CE) = E[U(w+X)]$. Risk premium = $E[w+X] - CE$. For risk-averse investors, CE < $E[w+X]$, so risk premium > 0.", "r": "Chapter 7 - Certainty equivalent"}, {"t": "Utility Theory", "s": 3, "ty": "fill", "q": "For $U(w)=\\ln(w)$, the Relative Risk Aversion RRA(w) equals ___", "a": "1", "x": "$U'(w)=1/w$, $U''(w)=-1/w^2$. $\\text{ARA} = 1/w$. $\\text{RRA} = w \\times \\text{ARA} = w \\times 1/w = 1$ (constant). So $\\ln(w)$ is CRRA with value 1.", "r": "Chapter 7 - RRA of log utility"}, {"t": "Utility Theory", "s": 2, "ty": "mc", "q": "An investor with $U(w) = w + 0.01w^2$ for w > 0 has $U''(w) = 0.02 > 0$. This investor is:", "o": ["Risk averse", "Risk neutral", "Risk loving", "CRRA"], "a": 2, "x": "$U''(w) > 0$ means CONVEX utility = risk loving. This investor would ACCEPT fair gambles (opposite of risk-averse). The quadratic utility has limited applicability because $U''>0$ violates risk aversion for all w. Only valid in restricted range.", "r": "Chapter 7 - Quadratic utility risk attitude"}];
</script>
<script>
// APP LOGIC
(function(){
var Q = QDATA;
if (!Q || Q.length === 0) { document.body.innerHTML = '<h1>Error: No questions loaded</h1>'; return; }

var filteredQ = Q.slice();
var currentIdx = 0;
var answered = {};
var wrongSet = new Set();
try { var saved = JSON.parse(localStorage.getItem('fm_wrong') || '[]'); saved.forEach(function(i){ wrongSet.add(i); }); } catch(e){}
var topicFilter = 'all';
var starFilter = 'all';

function saveWrong(){ localStorage.setItem('fm_wrong', JSON.stringify(Array.from(wrongSet))); updateWrongCount(); }

// === SCREENS ===
function show(id){ ['homeScreen','quizScreen','finishScreen','wrongScreen'].forEach(function(s){ document.getElementById(s).classList.add('hidden'); }); document.getElementById(id).classList.remove('hidden'); }

// === HOME ===
function initHome(){
  var topics = {};
  Q.forEach(function(q){ topics[q.t] = true; });
  var html = '<button class="chip active" data-topic="all">全部</button>';
  Object.keys(topics).forEach(function(t){ html += '<button class="chip" data-topic="'+t+'">'+t+'</button>'; });
  document.getElementById('topicChips').innerHTML = html;
  document.getElementById('matchCount').textContent = Q.length;
  updateWrongCount();
  document.getElementById('btnStart').onclick = startQuiz;
  document.getElementById('btnWrongHome').onclick = showWrongList;

  // Topic chips
  document.getElementById('topicChips').onclick = function(e){
    if (e.target.classList.contains('chip')) {
      topicFilter = e.target.dataset.topic;
      var chips = document.querySelectorAll('#topicChips .chip');
      chips.forEach(function(c){ c.classList.toggle('active', c.dataset.topic === topicFilter); });
      applyFilters();
    }
  };

  // Star chips
  document.getElementById('starChips').onclick = function(e){
    if (e.target.classList.contains('chip')) {
      starFilter = e.target.dataset.stars;
      var chips = document.querySelectorAll('#starChips .chip');
      chips.forEach(function(c){ c.classList.toggle('active', c.dataset.stars === starFilter); });
      applyFilters();
    }
  };
}

function applyFilters(){
  filteredQ = Q.filter(function(q){
    if (topicFilter !== 'all' && q.t !== topicFilter) return false;
    if (starFilter !== 'all' && q.s !== parseInt(starFilter)) return false;
    return true;
  });
  document.getElementById('matchCount').textContent = filteredQ.length;
}

function updateWrongCount(){
  var cnt = wrongSet.size;
  document.getElementById('wrongCountHome').textContent = cnt;
  document.getElementById('btnWrongHome').style.display = cnt > 0 ? '' : 'none';
}

// === QUIZ ===
function startQuiz(){
  if (filteredQ.length === 0) { alert('No questions match filters'); return; }
  currentIdx = 0; answered = {};
  show('quizScreen');
  renderQ();
}

function renderQ(){
  var q = filteredQ[currentIdx];
  var total = filteredQ.length;
  document.getElementById('progressFill').style.width = ((currentIdx+1)/total*100)+'%';
  document.getElementById('progressLabel').textContent = (currentIdx+1)+'/'+total;

  var starsHtml = q.s===3?'⭐⭐⭐ 高频':q.s===2?'⭐⭐ 中频':'⭐ 低频';
  document.getElementById('badgeRow').innerHTML = '<span class="badge">'+q.t+'</span><span class="badge imp">'+starsHtml+'</span><span class="badge" style="background:#f0fdf4;color:#15803d;border-color:#bbf7d0">'+(q.ty==='mc'?'选择题':'填空题')+'</span>';

  var key = currentIdx;
  var html = '<div class="q-type">第 '+(currentIdx+1)+' 题 - '+(q.ty==='mc'?'单选题':'填空题')+'</div>';
  html += '<div class="q-title">'+q.q+'</div>';

  var hasAnswer = (answered[key] !== undefined);

  if (q.ty === 'mc') {
    html += '<div class="options">';
    q.o.forEach(function(opt, i){
      var cls = 'opt-btn';
      if (hasAnswer) {
        if (i === q.a) cls += ' show-correct';
        else if (i === answered[key]) cls += ' wrong';
      }
      html += '<button class="'+cls+'" data-idx="'+i+'" '+(hasAnswer?'disabled':'')+'><strong>'+String.fromCharCode(65+i)+'.</strong> '+opt+'</button>';
    });
    html += '</div>';
  } else {
    html += '<input type="text" class="fill-input" id="fillInput" placeholder="Enter answer..." '+(hasAnswer?'disabled':'')+'>';
    html += '<button class="fill-submit" id="fillSubmit" '+(hasAnswer?'disabled':'')+'>Submit</button>';
  }

  if (hasAnswer) {
    var isCorrect = q.ty==='mc' ? answered[key]===q.a : checkFill(answered[key], q.a);
    html += '<div class="explain show"><strong>'+(isCorrect?'Correct!':'Wrong')+'</strong><br><br>'+q.x+'<span class="ref">'+q.r+'</span></div>';
  } else {
    html += '<div class="explain" id="explainBox"></div>';
  }

  document.getElementById('qCard').innerHTML = html;
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').textContent = (currentIdx >= total-1 && hasAnswer) ? 'Check Results' : 'Next';

  // Bind MC buttons
  if (q.ty === 'mc' && !hasAnswer) {
    var btns = document.querySelectorAll('.opt-btn');
    btns.forEach(function(b){ b.onclick = function(){ answerMC(parseInt(b.dataset.idx)); }; });
  }
  // Bind fill submit
  if (q.ty === 'fill' && !hasAnswer) {
    var submitBtn = document.getElementById('fillSubmit');
    if (submitBtn) submitBtn.onclick = answerFill;
  }

  window.scrollTo(0,0);
  // Render KaTeX after DOM update
  if (typeof renderMathInElement !== "undefined") {
    setTimeout(function(){
      renderMathInElement(document.getElementById("qCard"), {
        delimiters: [
          {left: "$", right: "$", display: false},
          {left: "$$", right: "$$", display: true}
        ],
        throwOnError: false
      });
      var explainBox = document.getElementById("explainBox");
      if (explainBox && explainBox.classList.contains("show")) {
        renderMathInElement(explainBox, {delimiters: [{left: "$", right: "$", display: false},{left: "$$", right: "$$", display: true}], throwOnError: false});
      }
    }, 50);
  }

}

function answerMC(choice){
  var q = filteredQ[currentIdx];
  answered[currentIdx] = choice;
  if (choice !== q.a) wrongSet.add(currentIdx); else wrongSet.delete(currentIdx);
  saveWrong(); renderQ();
}

function answerFill(){
  var input = document.getElementById('fillInput');
  if (!input) return;
  var val = input.value.trim();
  if (!val) return;
  var q = filteredQ[currentIdx];
  answered[currentIdx] = val;
  if (!checkFill(val, q.a)) wrongSet.add(currentIdx); else wrongSet.delete(currentIdx);
  saveWrong(); renderQ();
}

function checkFill(user, correct){
  var u = user.toLowerCase().replace(/\s+/g,'').replace(/%/g,'');
  var c = correct.toLowerCase().replace(/\s+/g,'').replace(/%/g,'');
  var un = parseFloat(u), cn = parseFloat(c);
  if (!isNaN(un) && !isNaN(cn)) return Math.abs(un-cn) < Math.max(0.01, cn*0.02);
  return u === c;
}

function nextQ(){
  if (answered[currentIdx] === undefined && filteredQ[currentIdx].ty === 'fill') { answerFill(); return; }
  if (currentIdx >= filteredQ.length - 1) { showFinish(); return; }
  currentIdx++; renderQ();
}

function prevQ(){ if (currentIdx>0){ currentIdx--; renderQ(); } }

function showFinish(){
  show('finishScreen');
  var total = filteredQ.length, correct = 0;
  filteredQ.forEach(function(q,i){
    if (answered[i] !== undefined){
      if (q.ty==='mc' ? answered[i]===q.a : checkFill(answered[i],q.a)) correct++;
    }
  });
  var wrong = total - correct, pct = total>0?Math.round(correct/total*100):0;
  var emoji = pct>=90?'🎉':pct>=70?'👍':pct>=50?'📚':'💪';
  document.getElementById('finishContent').innerHTML = '<h2>'+emoji+' Done!</h2><div class="score">'+pct+'<span style="font-size:24px">%</span></div><div class="stat-row"><div class="stat"><div class="n" style="color:#16a34a">'+correct+'</div><div class="l">Correct</div></div><div class="stat"><div class="n" style="color:#dc2626">'+wrong+'</div><div class="l">Wrong</div></div><div class="stat"><div class="n">'+total+'</div><div class="l">Total</div></div></div>'+(wrong>0?'<p style="margin-top:16px;color:#555">Wrong answers saved to Review</p>':'<p style="margin-top:16px;color:#16a34a">All correct!</p>');
}

// === WRONG LIST ===
function showWrongList(){
  show('wrongScreen');
  var container = document.getElementById('wrongContent');
  if (wrongSet.size === 0) {
    container.innerHTML = '<div class="finish"><h2>📋</h2><p>No wrong answers yet</p></div>';
    return;
  }
  var html = '<p style="color:#555;margin-bottom:16px"><strong>'+wrongSet.size+'</strong> wrong answers</p>';
  var indices = Array.from(wrongSet).map(Number).sort(function(a,b){return a-b;});
  indices.forEach(function(idx){
    var q = Q[idx];
    if (!q) return;
    html += '<div class="wrong-item"><div class="q">'+(idx+1)+'. ['+q.t+'] '+q.q+'</div><div class="a">Your: <span style="color:#dc2626">'+(answered[idx]||'(unanswered)')+'</span> | Correct: <span>'+ (q.ty==='mc'?q.o[q.a]:q.a) +'</span></div><div style="font-size:13px;color:#555;margin-top:6px">'+q.x+'</div></div>';
  });
  container.innerHTML = html;
}

function clearWrong(){ if(confirm('Clear all wrong answers?')){ wrongSet.clear(); saveWrong(); showWrongList(); } }

function goHome(){ show('homeScreen'); applyFilters(); updateWrongCount(); }

// Bind remaining buttons
document.getElementById('btnNext').onclick = nextQ;
document.getElementById('btnPrev').onclick = prevQ;
document.getElementById('btnHome').onclick = goHome;
document.getElementById('btnFinishHome').onclick = goHome;
document.getElementById('btnWrongBack').onclick = goHome;
document.getElementById('btnClearWrong').onclick = clearWrong;

initHome();
goHome();
})();
</script>
</body>
</html>
